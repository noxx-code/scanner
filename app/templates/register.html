<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – Security Scanner</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2>📝 Create Account</h2>
      <div id="error-msg" class="alert alert-error hidden"></div>
      <div id="success-msg" class="alert alert-success hidden"></div>
      <form id="register-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username"
                 minlength="3" maxlength="64" pattern="[a-zA-Z0-9]+"
                 title="Letters and digits only, 3–64 characters" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password <small>(min 8 characters)</small></label>
          <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>
      <p class="auth-footer">Already have an account? <a href="/login">Login</a></p>
    </div>
  </div>
  <script src="/static/auth.js"></script>
</body>
</html>
